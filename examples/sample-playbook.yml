---
- hosts: webservers
  become: yes
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present

    - shell: "cp /tmp/app.conf /etc/nginx/app.conf"

    - name: Start nginx
      service:
        name: nginx
        state: started
      notify: Reload nginx

    - block:
        - name: Deploy app
          copy:
            src: app.tar.gz
            dest: /opt/app/

        - name: Run migrations
          shell: "cd /opt/app && ./migrate.sh"
          ignore_errors: yes

    - name: Final health check
      uri:
        url: "http://localhost/health"
      register: health_result

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
